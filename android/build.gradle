// Top-level build file where you can add configuration options common to all sub-projects/modules.

buildscript {
    // 🚨 এই ব্লকটি আমি আগেরবার ভুল করে মুছে দিয়েছিলাম, এটি অত্যন্ত জরুরি!
    ext {
        buildToolsVersion = findProperty('android.buildToolsVersion') ?: '35.0.0'
        minSdkVersion = Integer.parseInt(findProperty('android.minSdkVersion') ?: '24')
        compileSdkVersion = Integer.parseInt(findProperty('android.compileSdkVersion') ?: '36')
        targetSdkVersion = Integer.parseInt(findProperty('android.targetSdkVersion') ?: '36')
        if (findProperty('android.kotlinVersion')) {
            kotlinVersion = findProperty('android.kotlinVersion')
        }
        frescoVersion = findProperty('expo.frescoVersion') ?: '3.2.0'
        
        // আপনার লগে থাকা NDK ভার্সন
        ndkVersion = "27.1.12297006" 
    }
    
    repositories {
        google()
        mavenCentral()
    }
    dependencies {
        classpath('com.android.tools.build:gradle')
        classpath('com.facebook.react:react-native-gradle-plugin')
        classpath('org.jetbrains.kotlin:kotlin-gradle-plugin')
    }
}

allprojects {
    repositories {
        google()
        mavenCentral()
        // 🚨 আমাদের ইউটিউব ইঞ্জিনের (youtubedl-android) জন্য JitPack রিপোজিটরি 🚨
        maven { url 'https://www.jitpack.io' }
    }
}

apply plugin: "expo-root-project"
apply plugin: "com.facebook.react.rootproject"